apiVersion: apps/v1
kind: Deployment
metadata:
  name: raegan-app
  labels:
    app: raegan-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raegan-app
  template:
    metadata:
      labels:
        app: raegan-app
    spec:
      containers:
        - name: raegan-app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
