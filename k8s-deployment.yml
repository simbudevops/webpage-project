apiVersion: apps/v1
kind: Deployment
metadata:
  name: raegan-app
  labels:
    app: raegan-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raegan-app
  template:
    metadata:
      labels:
        app: raegan-app
    spec:
      containers:
        - name: raegan-app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
