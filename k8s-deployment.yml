apiVersion: apps/v1
kind: Deployment

metadata:
  name: raegan-app-iam

spec:
  replicas: 2

  selector:
    matchLabels:
      app: raegan-app-iam

  template:
    metadata:
      labels:
        app: raegan-app-iam

    spec:
      containers:
        - name: raegan-app-iam

          image: IMAGE_PLACEHOLDER

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

