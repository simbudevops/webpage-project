<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAEGAN - AWS IAM Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #0f1629;
      --border: #1e3a5f;
      --accent: #ff2d78;
      --accent2: #ffd700;
      --text: #c8d8e8;
      --green: #00ff88;
      --purple: #7b2fff;
      --input-bg: #07090f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,45,120,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,120,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orb top-right */
    body::after {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,45,120,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.35em;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,45,120,0.5));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 20px rgba(255,45,120,0.4)); }
      50%      { filter: drop-shadow(0 0 50px rgba(255,215,0,0.5)); }
    }
    .tagline {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.25em;
      opacity: 0.75;
    }

    /* ── LOGIN CARD ── */
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid rgba(255,45,120,0.25);
      border-radius: 12px;
      padding: 40px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow:
        0 0 40px rgba(255,45,120,0.08),
        inset 0 0 40px rgba(255,45,120,0.03);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,45,120,0.2);
    }
    .aws-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #ff9900, #ff6a00);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ff9900;
      letter-spacing: 0.1em;
    }
    .card-sub {
      font-size: 0.72rem;
      color: rgba(200,216,232,0.45);
      margin-top: 2px;
    }

    /* ── FORM FIELDS ── */
    .field {
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(200,216,232,0.55);
      margin-bottom: 8px;
    }
    label span.required { color: var(--accent); margin-left: 2px; }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.5;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 14px 13px 42px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,45,120,0.12);
    }
    input::placeholder { color: rgba(200,216,232,0.25); }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.4;
      transition: opacity 0.2s;
      background: none;
      border: none;
      color: var(--text);
      padding: 0;
    }
    .toggle-pw:hover { opacity: 0.9; }

    /* ── ERROR ── */
    .error-msg {
      display: none;
      background: rgba(255,45,120,0.1);
      border: 1px solid rgba(255,45,120,0.35);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .error-msg.show { display: block; }

    /* ── LOGIN BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(255,45,120,0.2), rgba(123,47,255,0.2));
      border: 2px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,45,120,0.15), rgba(123,47,255,0.15));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:hover {
      box-shadow: 0 0 30px rgba(255,45,120,0.4);
      transform: translateY(-2px);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: 0.6; pointer-events: none; }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,45,120,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER NOTE ── */
    .secure-note {
      text-align: center;
      margin-top: 22px;
      font-size: 0.7rem;
      color: rgba(200,216,232,0.3);
      letter-spacing: 0.1em;
    }
    .secure-note span { color: var(--green); }

    /* ── PAGE FOOTER ── */
    footer {
      position: relative; z-index: 1;
      margin-top: 40px;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(200,216,232,0.25);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-title">RAEGAN</div>
    <div class="tagline">// AWS IAM Secure Access Portal //</div>
  </header>

  <div class="login-card">
    <div class="card-header">
      <div class="aws-icon">☁</div>
      <div>
        <div class="card-title">AWS IAM Sign In</div>
        <div class="card-sub">Identity &amp; Access Management</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">
      ⚠ Invalid credentials. Please check your IAM ID, username and password.
    </div>

    <div class="field">
      <label>IAM Account ID <span class="required">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="number" id="iamId" placeholder="123456789012" autocomplete="off" />
      </div>
    </div>

    <div class="field">
      <label>IAM Username <span class="required">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="iamUsername" placeholder="e.g. raegan-devops" autocomplete="off" />
      </div>
    </div>

    <div class="field">
      <label>Password <span class="required">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="iamPassword" placeholder="••••••••••••" autocomplete="off" />
        <button class="toggle-pw" onclick="togglePw()" id="toggleBtn" title="Show/Hide password">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">⚡ Sign in to AWS IAM</span>
      <div class="spinner"></div>
    </button>

    <p class="secure-note"><span>🔐</span> Connection is encrypted &amp; secured via AWS IAM</p>
  </div>

  <footer>RAEGAN DevOps Portal &nbsp;|&nbsp; AWS IAM Integration</footer>

<script>
  function togglePw() {
    const pw = document.getElementById('iamPassword');
    const btn = document.getElementById('toggleBtn');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
    }
  }

  function doLogin() {
    const id       = document.getElementById('iamId').value.trim();
    const username = document.getElementById('iamUsername').value.trim();
    const password = document.getElementById('iamPassword').value.trim();
    const errBox   = document.getElementById('errorMsg');
    const btn      = document.getElementById('loginBtn');

    // Basic front-end validation
    if (!id || !username || !password) {
      errBox.textContent = '⚠ All fields are required. Please fill in IAM ID, username and password.';
      errBox.classList.add('show');
      return;
    }
    if (id.length < 10) {
      errBox.textContent = '⚠ IAM Account ID must be at least 10 digits.';
      errBox.classList.add('show');
      return;
    }

    errBox.classList.remove('show');
    btn.classList.add('loading');

    // Store credentials in sessionStorage for the dashboard page
    sessionStorage.setItem('iam_id',       id);
    sessionStorage.setItem('iam_username', username);
    sessionStorage.setItem('iam_auth',     'true');

    // Simulate auth handshake delay then redirect to dashboard
    setTimeout(() => {
      window.location.href = '/dashboard.html';
    }, 1500);
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
